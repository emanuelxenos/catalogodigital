<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master Authentication | Plataforma</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Outfit', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        .glowing-box {
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.25);
        }
        .neon-input:focus {
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.2);
            border-color: rgba(236, 72, 153, 0.5) !important;
        }
    </style>
</head>
<body class="h-full font-sans antialiased bg-slate-950 text-slate-100 flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Glowing aesthetic nodes -->
    <div class="absolute inset-0 pointer-events-none z-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full bg-violet-600/10 blur-[130px]"></div>
        <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-pink-500/5 blur-[120px]"></div>
    </div>

    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-md bg-slate-950/60 backdrop-blur-2xl border border-slate-900 rounded-3xl p-8 shadow-2xl flex flex-col items-center gap-6 glowing-box">
        
        <!-- Tech/Matrix Header Icon -->
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-pink-500 via-violet-600 to-indigo-600 p-0.5 flex items-center justify-center shadow-lg shadow-violet-500/20">
            <div class="w-full h-full bg-slate-950 rounded-[14px] flex items-center justify-center">
                <span class="text-xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-violet-400">👑</span>
            </div>
        </div>
        
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-black text-white tracking-tight leading-tight uppercase tracking-wider">
                Master Auth
            </h1>
            <p class="text-xs font-bold text-violet-400 uppercase tracking-widest leading-none">Console de Segurança SaaS</p>
        </div>

        <div class="h-px w-full bg-slate-900"></div>

        <!-- Form error message (if any) -->
        {{if .Error}}
        <div class="w-full p-4 rounded-xl bg-red-500/10 border border-red-500/25 text-red-400 text-xs font-semibold leading-relaxed flex items-center gap-3">
            <span>⚠️</span>
            <span>{{.Error}}</span>
        </div>
        {{end}}

        <!-- Form fields -->
        <form action="/master/login" method="POST" class="w-full space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">E-mail Credencial</label>
                <input type="email" name="email" required placeholder="digite seu e-mail" 
                       class="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-900 focus:outline-none neon-input text-slate-200 text-sm font-semibold transition-all">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Senha de Acesso</label>
                <input type="password" name="password" required placeholder="••••••••" 
                       class="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-900 focus:outline-none neon-input text-slate-200 text-sm font-semibold transition-all">
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-pink-500 via-violet-600 to-indigo-600 hover:from-pink-400 hover:via-violet-500 hover:to-indigo-500 text-white font-bold text-xs uppercase tracking-widest shadow-lg shadow-violet-600/10 active:scale-[0.98] transition-all">
                    Autenticar Console
                </button>
            </div>
        </form>
    </div>
</body>
</html>
