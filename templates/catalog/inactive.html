<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Inativa | {{.Shop.Name}}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Outfit', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="/static/css/custom.css">
    
    <style>
        :root { --primary-color: {{.Shop.PrimaryColor}}; }
        .bg-primary { background-color: var(--primary-color) !important; }
        .text-primary { color: var(--primary-color) !important; }
    </style>
</head>
<body class="h-full font-sans antialiased bg-slate-900 text-slate-100 flex items-center justify-center p-4">
    <!-- Background blurred nodes -->
    <div class="absolute inset-0 bg-gradient-to-tr from-slate-950 via-slate-900 to-slate-950 overflow-hidden">
        <div class="absolute right-1/4 top-1/4 w-96 h-96 rounded-full blur-3xl opacity-20 bg-primary"></div>
        <div class="absolute left-1/4 bottom-1/4 w-80 h-80 rounded-full blur-3xl opacity-10 bg-primary"></div>
    </div>
    
    <!-- Main dialog box -->
    <div class="relative z-10 w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 rounded-3xl p-8 text-center shadow-2xl flex flex-col items-center gap-6">
        <!-- Shop Logo container -->
        <div class="w-20 h-20 rounded-2xl bg-white p-1 border border-slate-800 shadow-xl overflow-hidden flex items-center justify-center">
            {{if .Shop.LogoURL}}
            <img src="{{.Shop.LogoURL}}" alt="{{.Shop.Name}}" class="w-full h-full rounded-xl object-cover">
            {{else}}
            <div class="w-full h-full rounded-xl bg-primary flex items-center justify-center text-white text-3xl font-extrabold shadow-inner">
                {{slice .Shop.Name 0 1}}
            </div>
            {{end}}
        </div>
        
        <div class="space-y-2">
            <h1 class="text-2xl font-black text-white tracking-tight leading-tight">{{.Shop.Name}}</h1>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Catálogo Suspenso</p>
        </div>
        
        <div class="h-px w-full bg-slate-800/60"></div>
        
        <div class="space-y-3">
            <p class="text-sm text-slate-400 font-medium leading-relaxed">Esta loja está temporariamente inativa.</p>
            <p class="text-xs text-slate-500 leading-relaxed font-semibold">Se você é o proprietário desta loja, por favor verifique o status da sua assinatura no painel da plataforma.</p>
        </div>
        
        <div class="w-full pt-2">
            <a href="https://wa.me/{{.Shop.WhatsappNumber}}" target="_blank" class="w-full py-3.5 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/10">
                <svg class="w-4.5 h-4.5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Falar com o Lojista
            </a>
        </div>
    </div>
</body>
</html>
