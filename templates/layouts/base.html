{{define "layout"}}
<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Shop}}{{.Shop.Name}} | Cataloger{{else}}Cataloger | Seu catálogo online via WhatsApp{{end}}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    
    <!-- Meta tags dinâmicas para compartilhamento -->
    {{if .Shop}}
    <meta property="og:title" content="Confira o catálogo de {{.Shop.Name}}">
    <meta property="og:description" content="Faça seu pedido diretamente pelo nosso catálogo digital e envie no WhatsApp!">
    {{if .Shop.LogoURL}}<meta property="og:image" content="{{.Shop.LogoURL}}">{{end}}
    {{else}}
    <meta property="og:title" content="Cataloger | Monte seu catálogo online">
    <meta property="og:description" content="Crie seu catálogo digital e receba pedidos via WhatsApp de forma simples e rápida.">
    {{end}}
    <meta name="description" content="Catálogo digital com envio de pedidos via WhatsApp. Simples, rápido e profissional.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Outfit', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js (com plugin persist) -->
    <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">
    
    <!-- Cor dinâmica da loja -->
    {{if .Shop}}
    <style>
        :root {
            --primary-color: {{.Shop.PrimaryColor}};
            --primary-color-rgb: {{.Shop.PrimaryColor}};
        }
        .bg-primary { background-color: var(--primary-color) !important; }
        .text-primary { color: var(--primary-color) !important; }
        .border-primary { border-color: var(--primary-color) !important; }
        .ring-primary { --tw-ring-color: var(--primary-color) !important; }
        .btn-primary {
            background-color: var(--primary-color) !important;
            color: white !important;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
        }
    </style>
    {{end}}
</head>
<body class="h-full font-sans text-slate-800 bg-slate-50 antialiased">
    {{template "content" .}}
    
    <!-- Scripts -->
    <script src="/static/js/cart.js?v=1.2"></script>
</body>
</html>
{{end}}
