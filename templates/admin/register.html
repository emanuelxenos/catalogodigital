<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Catálogo Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { 'sans': ['Outfit', 'system-ui', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="h-full font-sans antialiased">
    <div class="min-h-full hero-gradient relative overflow-hidden flex items-center justify-center p-4">
        <div class="hero-grid absolute inset-0"></div>
        <div class="absolute top-1/4 right-1/3 w-96 h-96 bg-violet-600/15 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/3 left-1/4 w-80 h-80 bg-indigo-600/10 rounded-full blur-3xl"></div>
        
        <div class="relative w-full max-w-md animate-fade-in-up">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-500 to-indigo-600 shadow-xl shadow-violet-500/25 mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">Criar sua conta</h1>
                <p class="text-slate-400 mt-1">Configure sua loja em minutos</p>
            </div>
            
            <!-- Register Card -->
            <div class="glass-dark rounded-3xl p-8 shadow-2xl">
                {{if .Error}}
                <div class="mb-6 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-300 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    {{.Error}}
                </div>
                {{end}}
                
                <form method="POST" action="/admin/register" class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-slate-300 mb-2">Seu nome</label>
                        <input type="text" id="name" name="name" required placeholder="João Silva"
                            class="w-full px-4 py-3.5 rounded-xl bg-slate-800/50 border border-slate-700/50 text-white placeholder-slate-500 focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all text-sm">
                    </div>
                    
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com"
                            class="w-full px-4 py-3.5 rounded-xl bg-slate-800/50 border border-slate-700/50 text-white placeholder-slate-500 focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all text-sm">
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
                        <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6"
                            class="w-full px-4 py-3.5 rounded-xl bg-slate-800/50 border border-slate-700/50 text-white placeholder-slate-500 focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all text-sm">
                    </div>
                    
                    <hr class="border-slate-700/30 my-2">
                    
                    <div>
                        <label for="shop_name" class="block text-sm font-medium text-slate-300 mb-2">Nome da sua loja</label>
                        <input type="text" id="shop_name" name="shop_name" required placeholder="Minha Loja"
                            class="w-full px-4 py-3.5 rounded-xl bg-slate-800/50 border border-slate-700/50 text-white placeholder-slate-500 focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all text-sm">
                    </div>
                    
                    <div>
                        <label for="whatsapp" class="block text-sm font-medium text-slate-300 mb-2">WhatsApp (com DDD)</label>
                        <input type="text" id="whatsapp" name="whatsapp" required placeholder="5511999999999"
                            class="w-full px-4 py-3.5 rounded-xl bg-slate-800/50 border border-slate-700/50 text-white placeholder-slate-500 focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all text-sm">
                        <p class="text-xs text-slate-500 mt-1">Formato: 55 + DDD + número</p>
                    </div>
                    
                    <button type="submit" id="btn-register"
                        class="w-full py-3.5 rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold shadow-lg shadow-violet-500/25 hover:shadow-violet-500/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 mt-2">
                        Criar minha conta
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-slate-500 text-sm">
                        Já tem conta? 
                        <a href="/admin/login" class="text-violet-400 hover:text-violet-300 font-medium transition-colors">Fazer login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
